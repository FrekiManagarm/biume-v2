      - generic [ref=e57]:
        - article [ref=e58]:
          - paragraph [ref=e59]: Intent
          - heading "Un logiciel pour les ostéopathes animaliers qui veulent mieux suivre leurs clients." [level=2] [ref=e60]
          - paragraph [ref=e61]: Après une séance, le propriétaire oublie souvent une partie des explications. Biume structure vos points observés, vos conseils transmis par le praticien et la prochaine étape pour rendre le suivi post-séance plus professionnel.
        - article [ref=e62]:
          - paragraph [ref=e63]: Compte rendu
          - heading "Un résumé propriétaire prêt à relire." [level=2] [ref=e64]
          - paragraph [ref=e65]: Vous saisissez ou dictez vos observations, Biume prépare une version claire pour le propriétaire et vous validez avant envoi. Le compte rendu reste fidèle à votre vocabulaire, mais devient plus facile à comprendre.
        - article [ref=e66]:
          - paragraph [ref=e67]: Suivi
          - heading "Une timeline animal qui montre l'évolution." [level=2] [ref=e68]
          - paragraph [ref=e69]: Chaque animal conserve ses séances, points observés, zones de confort ou de mobilité, retours propriétaire et relances. Votre mémoire de suivi devient plus structurée entre deux rendez-vous.
        - article [ref=e70]:
          - paragraph [ref=e71]: Conversion
          - heading "Une relance utile au bon moment." [level=2] [ref=e72]
          - paragraph [ref=e73]: Le suivi J+7 aide à recueillir un retour simple. Le suivi J+30 peut rappeler la prochaine étape lorsque le praticien l'a prévue. L'objectif est d'améliorer la continuité, pas de pousser une vente artificielle.
