            - paragraph [ref=e79]: Non. Biume n'est pas conçu comme un scribe vétérinaire ou un outil de diagnostic. Il aide les thérapeutes animaliers à communiquer après la séance.
          - generic [ref=e80]:
            - heading "Pourquoi comparer Biume à MyPawScribe ?" [level=3] [ref=e81]
            - paragraph [ref=e82]: Parce que certains praticiens cherchent des outils IA de compte rendu. La comparaison clarifie que Biume cible les thérapeutes animaliers et le suivi propriétaire.
