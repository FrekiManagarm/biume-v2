          - heading "MyTour répond surtout aux praticiens mobiles et aux tournées." [level=2] [ref=e72]
          - paragraph [ref=e73]: Si l'enjeu est la route, les kilomètres et l'organisation terrain, MyTour a un angle naturel. Si l'enjeu est la compréhension du soin et la relance après la visite, Biume complète mieux ce flux.
