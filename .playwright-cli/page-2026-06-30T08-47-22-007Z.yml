          - heading "Stenko travaille la relation entre professionnels et propriétaires." [level=2] [ref=e68]
          - paragraph [ref=e69]: "Stenko est probablement le plus proche de la relation propriétaire. L'angle Biume reste différent: partir de la séance réelle, créer un résumé validé par le praticien et nourrir une timeline animal."
        - article [ref=e70]:
